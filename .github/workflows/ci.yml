name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: dtolnay/rust-toolchain@stable

      - name: Build (stub mode)
        run: cargo build --workspace --no-default-features

      - name: Test (stub mode)
        run: cargo test --workspace --no-default-features
